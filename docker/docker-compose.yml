version: '3.8'

services:
  # MongoDB is the FALLBACK database — only needed when DB_BACKEND=mongodb in .env
  # To enable: remove the 'profiles' line, or run: docker-compose --profile mongodb up
  mongodb:
    image: mongo:7
    container_name: georges_mongodb
    profiles:
      - mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=georges_medical
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: georges_elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: georges_backend
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    depends_on:
      - elasticsearch
    restart: unless-stopped

  llm-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.llm
    container_name: georges_llm
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: georges_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  es_data:
